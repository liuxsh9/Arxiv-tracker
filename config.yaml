categories: ["cs.SE", "cs.CL", "cs.AI"]
# 关键词只做粗召回（组间 AND：分类命中 且 任一关键词命中），精筛靠 curator
keywords:
  - "large language model"
  - "LLM"
  - "code generation"
  - "coding agent"
  - "software engineering"
  - "agent"
  - "benchmark"
  - "supervised fine-tuning"
  - "reinforcement learning"
  - "pretraining data"
  - "data synthesis"

# exclude_keywords: # 选择排除的关键词
#   - "Large Language Model"
#   - "LLM"
  
logic: "AND"                 # 组间逻辑：categories 与 keywords 间 AND/OR
max_results: 60              # 每轮候选上限（curator 会精选出 max_push 篇）
sort_by: "lastUpdatedDate"  # 还可以是submittedDate 建议改成lastUpdatedDate按更新时间排，能捞到v2/v3的“新增”
sort_order: "descending"

# zh / en / both
lang: "both"

# —— 摘要设置 ——
# mode: none / heuristic / llm
# 一天 5 次增量推送 + curator 模式下，全量条目只做启发式摘要（免 token，供网页归档）；
# 入选推送的论文由 curator.enrich 单独做丰富版 LLM 总结
summary:
  mode: heuristic
  # scope: tldr / full / both
  scope: "both"

# —— 邮件发送（默认关闭，主推送渠道为企业微信；需要再打开） ——
email:
  enabled: false
  subject: "[arXiv] Daily Digest"
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  smtp_pass_env: "SMTP_PASS"
  tls: "ssl"  # auto / ssl / starttls
  debug: false     # true 可打印 SMTP 调试日志
  detail: "full"  # simple / full
  max_items: 30
  attach_md: true  # 是否开启Markdown附件
  attach_pdf: false  # 是否开启PDF附件

# —— LLM（DeepSeek/OpenAI 兼容） ——
llm:
  provider: "openai-compatible"     # 兼容 OpenAI SDK 的服务
  # 硅基流动的版本
  base_url: "https://api.siliconflow.cn"
  model: "Qwen/Qwen2.5-7B-Instruct"
  api_key_env: "OPENAI_COMPAT_API_KEY"
  # Deepseek的版本
  # base_url: "https://api.deepseek.com"
  # model: "deepseek-chat"
  # api_key_env: "DS_API_KEY"
  

  system_prompt_en: |
    You are a senior paper-reading assistant. Based on the given metadata and abstract,
    write ONE concise paragraph in English that covers: research motivation, main method,
    and key experimental findings. Be objective and specific; avoid marketing language.
    Preserve any provided links, but do NOT repeat them in the paragraph.
  system_prompt_zh: |
    你是资深论文阅读助手。基于给定的论文元信息与摘要，用中文写「一段」简洁的总结，
    包含研究动机、核心方法与关键实验结果。保持客观、术语准确；避免营销式表述。
    如有链接请保留，但不要在总结里重复链接。

# —— 中文翻译设置（已关闭：curator 会为入选论文单独生成中文标题与摘要，
#     全量翻译只服务网页归档、徒增 token 成本） ——
translate:
  enabled: false
  lang: "zh"
  fields: ["title", "summary"]

site:
  enabled: true
  dir: "docs" 
  title: "arXiv 论文速递"
  keep_runs: 1024         # 历史保留期（按页面份数）
  theme: "light"        # "light" | "dark" | "auto"
  accent: "#2563eb"     # 主题色（可自定义）

freshness:
  since_days: 7             # 只看最近 7 天内新提交/更新
  unique_only: true       # 开启跨天去重（见过的 arXiv ID 不再重复发）
  state_path: ".state/seen.json"  # 去重状态文件（会随 docs 一起提交保存）
  fallback_when_empty: false # 当今天无新增时，是否回退展示最近的Top若干（建议false）

# —— 企业微信群机器人推送 ——
# webhook 地址属于敏感信息，只放 GitHub Secrets（WECOM_WEBHOOK_URL），不要写进本文件
wecom:
  enabled: true
  webhook_env: "WECOM_WEBHOOK_URL"
  header_title: "arXiv 论文速递"
  msg_type: "text"          # text=个人微信可见（微信插件不支持 markdown）；markdown=仅企业微信内美观
  max_items: 5              # 单次推送最多条目（一天 5 次增量，每次少而精）
  digest_max_chars: 130     # 普通条目摘要截断长度；curator 入选条目自动放宽到 3 倍

# —— 兴趣筛选 + 机构择优 + 精读级总结 ——
# 每轮流程：LLM 兴趣打分(批量) → 阈值过滤 → arXiv HTML 页头抓机构关键词(免token)
#          → 兴趣分+机构加分排序 → 取 top max_push → 每篇一次丰富版总结
# 未入选但过了阈值的论文仍会归档到网页版
curator:
  enabled: true
  min_score: 0.6            # 兴趣分及格线（0~1），调高更严格
  max_push: 5               # 每轮最多推送几篇（与 wecom.max_items 保持一致）
  inst_bonus: 0.15          # 命中 top_institutions 的排序加分
  fetch_affiliations: true  # 是否抓 arXiv HTML 页头识别机构（每篇约 1 个 HTTP 请求）

  # ⚠️ 用自然语言描述你的兴趣点（打分的依据，写得越具体越准）
  interests: |
    用户画像：LLM × Coding Agent × 软件工程方向的公司专家，负责大模型训练数据
    （预训练数据、SFT 数据、RL 训练数据）的建设。不做训练算法本身的研究。

    高度感兴趣（0.8~1.0）：
    - 大模型代码能力：代码生成、代码理解、代码修复、仓库级编程任务
    - Coding Agent：SWE-bench 类任务、agent 框架/脚手架、工具使用、
      计算机操作、issue 修复、终端/IDE 交互式编程智能体
    - 代码与 agent 的评测：新 benchmark、评测方法学、能力分析、失败模式分析
    - 面向代码/agent 的训练数据：预训练语料构建与清洗、SFT 数据合成与筛选、
      RL/RLVR 训练数据与环境构建、数据 scaling 规律、数据质量度量
    - LLM 时代的软件工程实证发现：AI 辅助开发的效率/质量研究、
      开发者与 AI 协作模式、AI 生成代码的缺陷/安全分析

    一般感兴趣（0.5~0.7）：
    - 通用 SFT/RLHF/RL 方法（若其数据构建部分有可迁移经验）
    - 通用 agent 推理/规划（非代码场景但方法可借鉴）
    - 程序分析/测试生成等传统 SE 技术与 LLM 的结合

    不感兴趣（<0.3）：
    - 纯视觉/多模态感知、语音
    - 医疗/法律/金融等垂直领域应用（除非核心贡献是数据或 agent 方法）
    - 纯理论（优化理论、泛化界）、模型压缩/推理加速、硬件

  # 机构关键词匹配（英文，大小写不敏感；命中任意一个即加分）
  top_institutions:
    - "DeepMind"
    - "OpenAI"
    - "Anthropic"
    - "Meta AI"
    - "FAIR"
    - "Microsoft Research"
    - "Stanford"
    - "MIT"
    - "Berkeley"
    - "CMU"
    - "Princeton"
    - "Tsinghua"
    - "Peking University"
    - "Shanghai AI Laboratory"
    - "Alibaba"
    - "Qwen"
    - "ByteDance"
    - "Seed"
    - "DeepSeek"
    - "Moonshot"
    - "Zhipu"

scrape:
  html: true               # 先用 HTML 页抓链接
  pdf_if_missing: true     # 若没抓到 code，再去扫 PDF 头部兜底
  pdf_first_page: false    # （可保留为 false；若你想“不管有没有都扫 PDF”，设 true）
  timeout: 10
